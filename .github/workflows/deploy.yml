# Runs on every push to main (i.e. after a PR merges).
# Builds all 4 images in parallel, pushes them to ghcr.io/ipanga/teka-rdc/*,
# then SSHes to the Hetzner server and pulls + restarts the stack.
name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent two deploys from stepping on each other.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}   # resolves to: ipanga/teka-rdc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - name: buyer-web
            dockerfile: apps/buyer-web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.teka.cd/api
              NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          - name: seller-web
            dockerfile: apps/seller-web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.teka.cd/api
              NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
              NEXT_PUBLIC_BASE_PATH=
          - name: admin-web
            dockerfile: apps/admin-web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.teka.cd/api
              NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
              NEXT_PUBLIC_BASE_PATH=
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/deploy/teka-rdc
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker logout ghcr.io
            docker image prune -f