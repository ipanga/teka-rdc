# Runs on every push to main (i.e. after a PR merges).
# Builds all 4 images in parallel, pushes them to ghcr.io/ipanga/teka-rdc/*,
# then SSHes to the server and performs a zero-downtime rolling update.
name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent two deploys from stepping on each other.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}   # resolves to: ipanga/teka-rdc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        # NOTE: `secrets.*` cannot be used inside `matrix.include` — the matrix
        # is evaluated at workflow-start time before the secrets context is
        # bound. Keep only literal name/dockerfile here; the "Compute build
        # args" step below fills in the Google client id via env.
        include:
          - { name: api,        dockerfile: apps/api/Dockerfile        }
          - { name: buyer-web,  dockerfile: apps/buyer-web/Dockerfile  }
          - { name: seller-web, dockerfile: apps/seller-web/Dockerfile }
          - { name: admin-web,  dockerfile: apps/admin-web/Dockerfile  }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-service build args. api needs none; the three web apps need the
      # API URL + Google client id baked in at build time (Next.js NEXT_PUBLIC_*
      # are compile-time constants). seller-web and admin-web also flip the
      # basePath to empty so they serve from their subdomain root.
      - name: Compute build args for ${{ matrix.name }}
        id: args
        env:
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: |
          set -eu
          case "${{ matrix.name }}" in
            api)
              echo "value=" >> "$GITHUB_OUTPUT"
              ;;
            buyer-web)
              {
                echo "value<<__END__"
                echo "NEXT_PUBLIC_API_URL=https://api.teka.cd/api"
                echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
                echo "__END__"
              } >> "$GITHUB_OUTPUT"
              ;;
            seller-web|admin-web)
              {
                echo "value<<__END__"
                echo "NEXT_PUBLIC_API_URL=https://api.teka.cd/api"
                echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
                echo "NEXT_PUBLIC_BASE_PATH="
                echo "__END__"
              } >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ steps.args.outputs.value }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: SSH rolling deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            cd /home/deploy/teka-rdc

            # ------------------------------------------------------------------
            # Authenticate to GHCR and pull all new images. `pull` does NOT
            # restart anything — containers keep serving the old image.
            # ------------------------------------------------------------------
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # `--env-file .env.production` handles yaml interpolation for every
            # compose invocation below. We do NOT shell-source the file:
            # `.env.production` is compose-format (unquoted values with spaces
            # are legal) and blows up under `sh -c . file` sourcing.
            COMPOSE="docker compose --env-file .env.production -f docker-compose.prod.yml"
            $COMPOSE pull

            # ------------------------------------------------------------------
            # Install the `docker rollout` CLI plugin. Idempotent — we always
            # (re)write the file and verify afterwards. The conditional form
            # failed silently when a prior run left a partial/broken plugin
            # that made `--help` return 0 while the real invocation blew up.
            #
            # User-home install avoids needing passwordless sudo on the VPS.
            # Docker scans $HOME/.docker/cli-plugins the same as the system
            # path.
            # ------------------------------------------------------------------
            mkdir -p "$HOME/.docker/cli-plugins"
            curl -fsSL \
              https://raw.githubusercontent.com/Wowu/docker-rollout/v0.9/docker-rollout \
              -o "$HOME/.docker/cli-plugins/docker-rollout"
            chmod +x "$HOME/.docker/cli-plugins/docker-rollout"
            # Clean up any stale system-wide install from earlier attempts so
            # we never mix versions.
            sudo rm -f /usr/local/lib/docker/cli-plugins/docker-rollout 2>/dev/null || true
            # Fail loudly if the install is bad — better here than 60s into a
            # rolling swap.
            docker rollout --help >/dev/null

            # ------------------------------------------------------------------
            # Zero-downtime rolling updates. Order matters:
            #   1. api first — web apps depend on it via the private network.
            #   2. buyer-web, seller-web, admin-web afterwards (independent).
            # On a fresh host a service has no running container yet, so
            # `docker rollout` would have nothing to swap — in that case we
            # just `up -d` once. Otherwise rollout starts a NEW container
            # beside the old one, waits for its healthcheck to report healthy,
            # then stops and removes the old. If health never goes green,
            # rollout exits non-zero and this step fails — the old container
            # keeps serving.
            # ------------------------------------------------------------------
            for svc in api buyer-web seller-web admin-web; do
              echo "▶ rolling $svc …"
              running="$($COMPOSE ps --services --filter status=running | grep -Fx "$svc" || true)"
              if [ -z "$running" ]; then
                echo "  no running container for $svc — starting fresh"
                $COMPOSE up -d --no-deps "$svc"
              else
                docker rollout -f docker-compose.prod.yml -t 180 --wait 10 "$svc"
              fi
            done

            # ------------------------------------------------------------------
            # nginx: reload if the config file changed, otherwise leave alone.
            # Recreating nginx would drop in-flight TCP connections, so we
            # never `up -d nginx` during a normal deploy.
            # ------------------------------------------------------------------
            if $COMPOSE exec nginx nginx -t >/dev/null 2>&1; then
              $COMPOSE exec nginx nginx -s reload || true
            fi

            docker logout ghcr.io
            docker image prune -f
