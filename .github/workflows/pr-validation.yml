# Runs on every pull request targeting main.
# Blocks merging if typecheck/tests fail, or if any of the 4 Dockerfiles
# fail to build. Lint runs but does not block (tracked as tech debt).
name: PR validation

on:
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @teka/shared build

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci

      # Non-blocking — the existing codebase has ~3k strict-typecheck-style
      # ESLint errors (mostly unsafe-any in Jest test utilities). Tracked as
      # tech debt; failures are surfaced in the action log but don't block PRs.
      - name: Lint (non-blocking)
        run: pnpm lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm type-check

      - name: Unit tests
        run: pnpm --filter api test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

      - name: E2e tests
        run: pnpm --filter api test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          SMS_PROVIDER: mock
          RESEND_API_KEY: ''
          AT_API_KEY: ''
          GOOGLE_WEB_CLIENT_ID: test-web-client-id

  docker-build-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api,        dockerfile: apps/api/Dockerfile }
          - { name: buyer-web,  dockerfile: apps/buyer-web/Dockerfile }
          - { name: seller-web, dockerfile: apps/seller-web/Dockerfile }
          - { name: admin-web,  dockerfile: apps/admin-web/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
