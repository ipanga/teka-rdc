name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @teka/shared build

      # Prisma Client types are generated into node_modules and must exist
      # before the API can be type-checked.
      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          # Any valid-looking Postgres URL works — prisma generate does not connect.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci

      - name: Type check
        run: pnpm type-check

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @teka/shared build

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci

      # Unit tests with Jest default config find 0 matches under src/ — the real
      # test surface is the e2e suite under apps/api/test/ which mocks Prisma
      # (no live DB needed). --passWithNoTests also guards the src/ step.
      - name: Run API unit tests (noop — e2e covers real cases)
        run: pnpm --filter api test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

      - name: Run API e2e tests
        run: pnpm --filter api test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/teka_ci
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          SMS_PROVIDER: mock
          RESEND_API_KEY: ''
          AT_API_KEY: ''
          GOOGLE_WEB_CLIENT_ID: test-web-client-id

  flutter-analyze:
    name: Flutter Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [buyer-mobile, seller-mobile]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get

      - name: Generate l10n
        working-directory: apps/${{ matrix.app }}
        run: flutter gen-l10n

      # --no-fatal-infos keeps existing deprecation notices (withOpacity,
      # groupValue, encryptedSharedPreferences) from breaking the build.
      # Real errors and warnings still fail.
      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze --no-fatal-infos
