# Production stack (server-side).
#
# This file lives on the server at /home/deploy/teka-rdc/docker-compose.prod.yml
# and is invoked by the GitHub Actions deploy workflow. Images are built in CI
# and pulled from ghcr.io; the server never builds anything.
#
# Zero-downtime strategy: the deploy workflow uses the `docker rollout` CLI
# plugin to swap containers one at a time — each new replica must pass its
# healthcheck before the old one is stopped. nginx holds the TCP door open
# throughout. See .github/workflows/deploy.yml for the rollout sequence.
#
# Required files alongside this one:
#   .env.production              (chmod 600; DB URLs, secrets, GOOGLE_CLIENT_ID)
#   nginx/nginx.prod.conf        (reverse proxy config for all 4 subdomains)
#   certbot/conf/                (Let's Encrypt live certs)
#   certbot/www/                 (ACME http-01 challenge webroot)

x-healthcheck-defaults: &web-healthcheck
  interval: 15s
  timeout: 5s
  start_period: 30s
  retries: 3

services:
  # === API (NestJS) ===
  api:
    image: ghcr.io/ipanga/teka-rdc/api:latest
    env_file: .env.production
    networks:
      - frontend
      - backend
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Buyer Web (Next.js) — served at https://teka.cd ===
  buyer-web:
    image: ghcr.io/ipanga/teka-rdc/buyer-web:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - API_INTERNAL_URL=http://api:5050/api
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    # Healthcheck is defined in the Dockerfile (curl 127.0.0.1:5000). Repeating
    # the cadence here so the rollout script can poll `docker inspect` reliably.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      <<: *web-healthcheck
    logging: *default-logging

  # === Seller Web (Next.js) — served at https://seller.teka.cd ===
  seller-web:
    image: ghcr.io/ipanga/teka-rdc/seller-web:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_BASE_PATH=
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      # Seller root may redirect to /login, so accept any 2xx/3xx.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:5100/ | grep -qE '^(2|3)[0-9][0-9]$$'"]
      <<: *web-healthcheck
    logging: *default-logging

  # === Admin Web (Next.js) — served at https://admin.teka.cd ===
  admin-web:
    image: ghcr.io/ipanga/teka-rdc/admin-web:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_BASE_PATH=
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:5200/ | grep -qE '^(2|3)[0-9][0-9]$$'"]
      <<: *web-healthcheck
    logging: *default-logging

  # === NGINX Reverse Proxy — terminates SSL for all 4 subdomains ===
  #
  # NGINX is the single point of contact for clients and therefore the piece
  # that must NOT get recreated during a deploy (recreation = brief TCP reset).
  # The rollout script below only restarts the web + api containers; nginx
  # gets `nginx -s reload` if its config changed, nothing more.
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - buyer-web
      - seller-web
      - admin-web
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

networks:
  frontend:
  backend:
