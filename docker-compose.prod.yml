# Production stack (server-side).
#
# This file lives on the server at /home/deploy/teka-rdc/docker-compose.prod.yml
# and is invoked by the GitHub Actions deploy workflow via:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Images are built in GitHub Actions and pulled from ghcr.io. The server never
# builds anything. Any change to NEXT_PUBLIC_* values requires a new build in
# CI (they are baked into the Next.js images at build time).
#
# Required files alongside this one:
#   .env.production              (chmod 600; holds DB URLs, secrets, GOOGLE_CLIENT_ID)
#   nginx/nginx.prod.conf        (reverse proxy config for all 4 subdomains)
#   certbot/conf/                (Let's Encrypt live certs, populated by certbot)
#   certbot/www/                 (ACME http-01 challenge webroot)

services:
  # === API (NestJS) ===
  api:
    image: ghcr.io/ipanga/teka-rdc/api:latest
    env_file: .env.production
    networks:
      - frontend
      - backend
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Buyer Web (Next.js) — served at https://teka.cd ===
  buyer-web:
    image: ghcr.io/ipanga/teka-rdc/buyer-web:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - API_INTERNAL_URL=http://api:5050/api
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    logging: *default-logging

  # === Seller Web (Next.js) — served at https://seller.teka.cd ===
  seller-web:
    image: ghcr.io/ipanga/teka-rdc/seller-web:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_BASE_PATH=
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    logging: *default-logging

  # === Admin Web (Next.js) — served at https://admin.teka.cd ===
  admin-web:
    image: ghcr.io/ipanga/teka-rdc/admin-web:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_BASE_PATH=
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    logging: *default-logging

  # === NGINX Reverse Proxy — terminates SSL for all 4 subdomains ===
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - buyer-web
      - seller-web
      - admin-web
    networks:
      - frontend
    restart: unless-stopped
    logging: *default-logging

networks:
  frontend:
  backend: