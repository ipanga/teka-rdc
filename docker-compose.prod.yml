# Production stack. Invoke with:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Each Next.js app is built with its production NEXT_PUBLIC_* values baked in.
# Any change to those values (API URL, Google client ID, base path) requires a
# rebuild of that service, not just a restart.

services:
  # === API (NestJS) ===
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.production
    depends_on: []
    networks:
      - frontend
      - backend
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Buyer Web (Next.js) — served at https://teka.cd ===
  buyer-web:
    build:
      context: .
      dockerfile: apps/buyer-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.teka.cd/api"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - API_INTERNAL_URL=http://api:5050/api
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Seller Web (Next.js) — served at https://seller.teka.cd, basePath empty ===
  seller-web:
    build:
      context: .
      dockerfile: apps/seller-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.teka.cd/api"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
        NEXT_PUBLIC_BASE_PATH: ""
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_BASE_PATH=
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Admin Web (Next.js) — served at https://admin.teka.cd, basePath empty ===
  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.teka.cd/api"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
        NEXT_PUBLIC_BASE_PATH: ""
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.teka.cd/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_BASE_PATH=
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === NGINX Reverse Proxy — terminates SSL for all 4 subdomains ===
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - buyer-web
      - seller-web
      - admin-web
    networks:
      - frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:
  backend:
