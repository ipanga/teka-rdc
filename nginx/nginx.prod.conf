worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # SSL session caching
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

    # Upstreams
    upstream api_upstream     { server api:5050; }
    upstream buyer_upstream   { server buyer-web:5000; }
    upstream seller_upstream  { server seller-web:5100; }
    upstream admin_upstream   { server admin-web:5200; }

    # =============================================================
    # Shared security headers (included per server block)
    # =============================================================
    # Buyer/seller/admin: full CSP including accounts.google.com for the GSI
    # button iframe + connect-src to the API subdomain.
    map $host $tk_csp {
        default                  "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: blob: https://res.cloudinary.com https://lh3.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://accounts.google.com; connect-src 'self' https://api.teka.cd https://accounts.google.com;";
    }

    # =============================================================
    # HTTP → HTTPS redirect (all subdomains + ACME challenge)
    # =============================================================
    server {
        listen 80 default_server;
        server_name teka.cd www.teka.cd api.teka.cd seller.teka.cd admin.teka.cd;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================
    # API — https://api.teka.cd
    # =============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.teka.cd;

        # Single SAN cert covers teka.cd, api.teka.cd, seller.teka.cd, admin.teka.cd
        ssl_certificate     /etc/letsencrypt/live/teka.cd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/teka.cd/privkey.pem;

        client_max_body_size 10M;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Payment webhooks — no rate-limit beyond a soft cap; signature is verified
        # in-app and webhooks must not be blocked even under bursty retries.
        location /api/v1/payments/webhook/ {
            limit_req zone=webhook_limit burst=20 nodelay;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints — stricter rate limiting (OTP flood protection)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other API traffic
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Anything else on the API host is a 404 — don't proxy the web apps.
        location / {
            return 404;
        }
    }

    # =============================================================
    # Buyer web — https://teka.cd (+ www redirect)
    # =============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name www.teka.cd;

        ssl_certificate     /etc/letsencrypt/live/teka.cd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/teka.cd/privkey.pem;

        return 301 https://teka.cd$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name teka.cd;

        ssl_certificate     /etc/letsencrypt/live/teka.cd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/teka.cd/privkey.pem;

        client_max_body_size 10M;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $tk_csp always;

        # Long-lived cache for Next.js static assets
        location /_next/static/ {
            proxy_pass http://buyer_upstream;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf)$ {
            proxy_pass http://buyer_upstream;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public";
            access_log off;
        }

        location / {
            proxy_pass http://buyer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # =============================================================
    # Seller portal — https://seller.teka.cd (basePath disabled in prod build)
    # =============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name seller.teka.cd;

        ssl_certificate     /etc/letsencrypt/live/teka.cd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/teka.cd/privkey.pem;

        client_max_body_size 10M;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $tk_csp always;

        location /_next/static/ {
            proxy_pass http://seller_upstream;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            proxy_pass http://seller_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # =============================================================
    # Admin portal — https://admin.teka.cd (basePath disabled in prod build)
    # =============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.teka.cd;

        ssl_certificate     /etc/letsencrypt/live/teka.cd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/teka.cd/privkey.pem;

        client_max_body_size 10M;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $tk_csp always;

        location /_next/static/ {
            proxy_pass http://admin_upstream;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            proxy_pass http://admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
