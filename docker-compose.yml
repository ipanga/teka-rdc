services:
  # === API (NestJS) ===
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "5050:5050"
    env_file:
      - .env.development
    depends_on: []
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Buyer Web (Next.js) ===
  buyer-web:
    build:
      context: .
      dockerfile: apps/buyer-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5050/api"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
    ports:
      - "5001:5000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5050/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - API_INTERNAL_URL=http://api:5050/api
    depends_on:
      - api

  # === Seller Web (Next.js) ===
  seller-web:
    build:
      context: .
      dockerfile: apps/seller-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5050/api"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
    ports:
      - "5100:5100"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5050/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      - api

  # === Admin Web (Next.js) ===
  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5050/api"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
    ports:
      - "5200:5200"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5050/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      - api

  # === NGINX Reverse Proxy ===
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - buyer-web
      - seller-web
      - admin-web
